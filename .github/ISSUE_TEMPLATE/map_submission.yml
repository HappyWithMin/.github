name: 地图投稿
description: 提交地图、玩法地图或活动场景作品
title: "[地图投稿]: "
body:
  - type: input
    id: map_name
    attributes:
      label: 地图名称
      placeholder: 请输入地图名称
    validations:
      required: true

  - type: dropdown
    id: map_type
    attributes:
      label: 地图类型
      options:
        - 跑酷
        - 解谜
        - PVP
        - RPG
        - 活动场景
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 适用版本
      description: 例如 Paper 1.21.x / Java 版 1.21.x
      placeholder: 请输入适用版本
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: 地图介绍
      description: 简要说明玩法、人数、特色和注意事项。
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: 下载或预览链接
      description: 请提供网盘、仓库、视频或截图链接。
      placeholder: 请粘贴可访问的链接
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: 作者或团队名称
      placeholder: 请输入作者名称
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: 联系方式
      description: 请留下可联系到你的邮箱、QQ 或其他方式。
      placeholder: 请输入联系方式
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: 确认事项
      options:
        - label: 我确认该投稿内容可以由与岷同乐团队进行评估与后续联系
          required: true
        - label: 我确认我拥有该地图或投稿内容的授权，或已获得合法许可
          required: true
